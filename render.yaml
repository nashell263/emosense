services:
  - type: web
    name: emosense
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: VONAGE_FROM_NUMBER
        sync: false
      - key: VONAGE_TO_NUMBER
        sync: false
      - key: EASYSEND_USERNAME
        sync: false
      - key: EASYSEND_PASSWORD
        sync: false
      - key: EASYSEND_API_KEY
        sync: false
      - key: EASYSEND_SENDER
        sync: false
      - key: ADMIN_PHONE_NUMBER
        sync: false
    disk:
      name: emosense-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
